<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BLUEBIRD: THE OCCULT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        
        /* 📍 배경은 완전한 블랙 고정 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Noto Serif KR', serif; overflow: hidden; display: flex; justify-content: center; align-items: center; color: #fff; }
        
        /* 시작화면 전용 배경 (게임 시작 후 어두워지며 완전히 사라짐) */
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: brightness(0.4) contrast(1.2); transition: 2s; z-index: 1; }
        
        /* 📍 메인 컨테이너: 좌측 미디어 스페이스 + 우측 대사창 와이드 레이아웃 */
        #container { 
            position: relative; 
            z-index: 10; 
            width: 98%; 
            max-width: 1700px; 
            height: 92vh;
            display: none; 
            flex-direction: row; 
            justify-content: space-between;
            align-items: center;
            gap: 25px;
        }

        /* 📦 [좌측 초대형 미디어 공간] */
        .char-side-area {
            flex: 1.5; 
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: #050508;
            border: 1px solid rgba(74, 144, 226, 0.2);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .char-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            position: relative;
            transition: all 0.5s ease;
            opacity: 0;
            transform: scale(0.98);
        }

        .char-box.active {
            opacity: 1;
            transform: scale(1);
        }

        /* 📍 [절대 안 잘림] 이미지와 영상 모두 원본 비율 그대로 꽉 차게 연출 */
        .scene-display-img, .scene-display-video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            border-radius: 10px;
            z-index: 2;
            display: none; /* JS 판별 전까지 숨김 */
        }

        /* 📦 [우측 배치] 선택지 및 스토리 인터페이스 상자 박스 */
        .interface-area {
            flex: 1.1; 
            height: 100%;
            padding: 35px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto;
            background: rgba(10, 10, 15, 0.95); 
            border: 1px solid rgba(74, 144, 226, 0.3); 
            backdrop-filter: blur(25px); 
            box-shadow: -10px 0 5px rgba(0,0,0,0.5); 
            border-radius: 12px;
        }

        .game-header-title { font-size: 20px; color: #4a90e2; letter-spacing: 6px; text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(74, 144, 226, 0.3); padding-bottom: 12px; font-weight: bold; }
        #scene-name { font-size: 13px; color: #888; letter-spacing: 2px; margin-bottom: 15px; text-align: right; font-style: italic; }

        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(255,255,255,0.04); padding: 14px 5px; margin-bottom: 25px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06); }
        .stat { text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }
        .stat:last-child { border-right: none; }
        .label { display: block; font-size: 11px; color: #aaa; margin-bottom: 6px; font-weight: bold; }
        .val { font-weight: bold; font-size: 17px; }
        #omega { color: #5dade2; } #upbo { color: #ec7063; } #phi { color: #58d68d; } #hp { color: #f4d03f; }

        #speaker-name { font-size: 17px; color: #4a90e2; font-weight: bold; letter-spacing: 2px; margin-bottom: 15px; padding-left: 12px; border-left: 4px solid #4a90e2; text-align: left; }
        #story-text { color: #fff; line-height: 1.9; font-size: 16px; min-height: 160px; margin-bottom: 25px; white-space: pre-wrap; text-align: left; }
        
        .choice-box { display: flex; flex-direction: column; gap: 10px; margin-bottom: 5px; }
        .btn { display: block; width: 100%; padding: 16px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: #ccc; cursor: pointer; text-align: left; transition: 0.3s; font-family: inherit; font-size: 14px; border-radius: 6px; }
        .btn:hover { background: rgba(74, 144, 226, 0.25); color: #fff; border-color: #4a90e2; padding-left: 25px; }

        #opening { position: relative; z-index: 20; text-align: center; color: #fff; }
        #opening h1 { font-size: 65px; letter-spacing: 20px; color: #4a90e2; text-shadow: 0 0 30px rgba(74, 144, 226, 0.8); margin-bottom: 50px; }
        .occult-btn { padding: 25px 85px; font-size: 22px; background: rgba(0, 0, 0, 0.9); border: 1px solid #4a90e2; color: #4a90e2; cursor: pointer; transition: 0.5s; font-family: inherit; letter-spacing: 6px; border-radius: 4px; }
        .occult-btn:hover { background: #4a90e2; color: #fff; box-shadow: 0 0 40px rgba(74, 144, 226, 0.6); }

        .developer-info { position: fixed; top: 25px; left: 30px; z-index: 30; font-size: 14px; letter-spacing: 2px; color: rgba(255, 255, 255, 0.65); font-family: inherit; border-left: 3px solid #4a90e2; padding-left: 12px; line-height: 1.6; }
        .developer-info span { color: #4a90e2; font-weight: bold; }
    </style>
</head>
<body>
    <div id="bg"></div>

    <div id="dev-header" class="developer-info">
        DEVELOPER<br>
        <span>25730027 김서원</span>
    </div>

    <div id="opening">
        <h1>BLUEBIRD</h1>
        <p style="color:#888; margin-bottom:50px; letter-spacing:5px;">THE OCCULT : 관측의 저주</p>
        <button class="occult-btn" onclick="startGame()">심연의 눈을 뜨다</button>
    </div>

    <div id="container">
        
        <div class="char-side-area">
            <div id="box-left" class="char-box">
                <img id="scene-img-left" class="scene-display-img" src="" alt="" onerror="this.style.display='none';">
                <video id="scene-video-left" class="scene-display-video" autoplay loop muted playsinline></video>
            </div>
        </div>

        <div class="interface-area">
            <div>
                <div class="game-header-title">BLUEBIRD: THE OCCULT</div>
                <div id="scene-name">Scene: LOADING...</div>
                
                <div class="stats-bar">
                    <div class="stat"><span class="label">오염(Ω)</span><span id="omega" class="val">20</span></div>
                    <div class="stat"><span class="label">업보(Karma)</span><span id="upbo" class="val">0</span></div>
                    <div class="stat"><span class="label">명료(φ)</span><span id="phi" class="val">50</span></div>
                    <div class="stat"><span class="label">체력(HP)</span><span id="hp" class="val">100</span></div>
                </div>
                
                <div id="speaker-name">시스템</div>
                <div id="story-text"></div>
            </div>

            <div>
                <div id="choice-box" class="choice-box"></div>
            </div>
        </div>

    </div>

    <script>
        let stats = { omega: 20, upbo: 0, phi: 50, hp: 100 };

        // 시작화면 전용 포스터 이미지 설정
        document.getElementById('bg').style.backgroundImage = "url('./image/start.png')";

        function startGame() {
            document.getElementById('dev-header').style.display = 'none';
            document.getElementById('opening').style.display = 'none';
            document.getElementById('bg').style.display = 'none'; // 올 블랙 연출을 위해 아웃 처리
            document.getElementById('container').style.display = 'flex';
            update('s1');
        }

        const data = {
            s1: { 
                scene: "S1: 청조촌 입구", speaker: "청조촌 무녀", 
                sceneImg: './image/S1.png', 
                leftName: "무녀",
                text: "'가련한 관측자여, 그 눈으로는 아무것도 구할 수 없다. 내가 주는 이 푸른 안구를 받아들여라. 비로소 동생이 보일 것이니.'", 
                choices: [
                    { t: "[수용] 푸른 안구를 이식한다.", n: 's2', e: { omega: 30 } },
                    { t: "[저항] 무녀의 손을 뿌리친다.", n: 's2', e: { hp: -25, upbo: 10 } }
                ]
            },
            s2: { 
                scene: "S2: 망자의 늪", speaker: "미치의 환영", 
                sceneImg: './image/S2.mp4', /* 💡 S2 비디오 교체 완료 */
                leftName: "미치",
                text: "'언니... 나 여기 있어... 너무 추워... 왜 이제야 온 거야?'\n\n늪 속에서 동생의 목소리가 들리지만, 어딘가 기괴하게 뒤틀려 있습니다.", 
                choices: [
                    { t: "[불신] 환상을 외면하고 길을 찾는다.", n: 's3', e: { upbo: -10, phi: 15 } },
                    { t: "[맹신] 소리가 나는 늪으로 뛰어든다.", n: 's3', e: { upbo: 15, phi: -20, omega: 20 } }
                ]
            },
            s3: { 
                scene: "S3: 경전 각", speaker: "도서관 수호자", 
                sceneImg: './image/S3.mp4', /* 💡 S3 비디오 교체 완료 */
                leftName: "수호자",
                text: "'진실은 독과 같다. 더 깊이 알수록 너는 인간이 아니게 될 것이다. 그래도 이 기록을 탐하겠느냐?'", 
                choices: [
                    { t: "[지식] 금지된 경전을 읽는다.", n: 's4', e: { phi: 20, omega: 15 } },
                    { t: "[침묵] 경전을 불태워 버린다.", n: 's4', e: { upbo: -15, hp: -10 } }
                ]
            },
            s4: { 
                scene: "S4: 탄생의 굴", speaker: "괴조들의 왕", 
                sceneImg: './image/S4.png', 
                leftName: "괴조왕",
                text: "'크헤헤... 이 아이는 우리의 제물이다! 구하고 싶나? 그럼 네 육신의 절반을 내놓아라!'", 
                choices: [
                    { t: "[희생] 내 피를 제물로 바친다.", n: 's5', e: { hp: -50, upbo: -25 } },
                    { t: "[투쟁] 괴조의 심장을 겨냥한다.", n: 's5', e: { upbo: 40, omega: -10 } }
                ]
            },
            s5: { 
                scene: "S5: 밤의 궁전", speaker: "파랑새의 눈", 
                sceneImg: './image/S5.png', 
                leftName: "파랑새",
                text: "'마침내 도달했구나. 이제 관측을 끝낼 시간이다. 스스로 파멸할 것인가, 아니면 이 저주받은 세계의 주인이 될 것인가?'", 
                choices: [
                    { t: "[해방] 이 모든 저주를 끊어낸다.", n: 'choice_liberation' },
                    { t: "[군림] 동생의 운명까지 심연으로 잠식한다.", n: 'choice_reign' }
                ]
            }
        };

        function update(id) {
            if(id === 'choice_liberation') {
                return (stats.upbo < 20) ? finish('end_good') : finish('end_bad_wander');
            }
            if(id === 'choice_reign') {
                return (stats.omega >= 90) ? finish('end_bad_occult') : finish('end_bad_fail');
            }

            const s = data[id];
            document.getElementById('scene-name').innerText = "Location: " + s.scene;
            document.getElementById('speaker-name').innerText = s.speaker;
            document.getElementById('story-text').innerText = s.text;
            for(let key in stats) document.getElementById(key).innerText = stats[key];

            // 미디어 슬롯 자동 확장자 체크 실행
            setupSceneImage('left', s.sceneImg, s.leftName);

            const box = document.getElementById('choice-box');
            box.innerHTML = '';
            s.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = c.t;
                b.onclick = () => {
                    if(c.e) for(let k in c.e) stats[k] += c.e[k];
                    update(c.n);
                };
                box.appendChild(b);
            });
        }

        // 🔄 확장자를 실시간 체크하여 이미지 태그와 비디오 태그를 스위칭하고 연출하는 함수
        function setupSceneImage(direction, imgPath, name) {
            const box = document.getElementById(`box-${direction}`);
            const img = document.getElementById(`scene-img-${direction}`);
            const video = document.getElementById(`scene-video-${direction}`);

            if(!name && !imgPath) {
                box.classList.remove('active');
                if(img) img.style.display = 'none';
                if(video) { video.style.display = 'none'; video.pause(); }
                return;
            }

            box.classList.add('active');

            if(imgPath) {
                if(imgPath.toLowerCase().endsWith('.mp4')) {
                    if(img) img.style.display = 'none';
                    if(video) {
                        video.src = imgPath;
                        video.style.display = 'block';
                        video.load();
                        video.play().catch(e => console.log("Browser Policy Skip"));
                    }
                } else {
                    if(video) { video.style.display = 'none'; video.pause(); }
                    if(img) {
                        img.src = imgPath;
                        img.style.display = 'block';
                    }
                }
            } else {
                if(img) img.style.display = 'none';
                if(video) { video.style.display = 'none'; video.pause(); }
            }
        }

        function finish(type) {
            document.getElementById('scene-name').innerText = "Location: Destiny";
            
            let mainTitle = ""; let subDesc = ""; let finishImg = "";

            /* 📍 엔딩 분기 조건 체크: end_c만 mp4 영상 파일로 분기 설정 */
            if(type === 'end_good') {
                mainTitle = "[안식: 진정한 구원]";
                subDesc = "당신은 마침내 동생과 함께 저주를 끊어내고 마을을 탈출했습니다. 이제 안개의 위협이 없는 곳에서 평온한 삶을 살아가세요.";
                finishImg = './image/end_a.png'; 
            } else if(type === 'end_bad_wander') {
                mainTitle = "[방랑: 불완전한 구원]";
                subDesc = "동생은 구했지만 당신의 업보가 발목을 잡습니다. 동생은 떠나보냈으나 당신은 영원히 안개 속을 떠돌게 될 것입니다.";
                finishImg = './image/end_b.png'; 
            } else if(type === 'end_bad_occult') {
                mainTitle = "[잠식: 심연의 주인]";
                subDesc = "인간이기를 포기한 당신은 파랑새의 저주를 완전히 받아들였습니다. 이제 당신이 이 기괴한 마을의 새로운 신입니다.";
                finishImg = './image/S5.png'; 
            } else {
                mainTitle = "[소멸: 공허의 파멸]";
                subDesc = "심연을 감당하기엔 당신의 그릇이 너무나도 작았습니다. 아무것도 구하지 못한 채, 당신은 어둠 속으로 먹혀버렸습니다.";
                finishImg = './image/end_c.mp4'; /* 💡 소멸 엔딩 비디오 교체 완료 */
            }
            
            if(finishImg) {
                setupSceneImage('left', finishImg, "ENDING");
            } else {
                document.getElementById('box-left').classList.remove('active');
            }

            document.getElementById('speaker-name').innerText = "최종 운명";
            const storyBox = document.getElementById('story-text');
            storyBox.innerHTML = '';
            const titleEl = document.createElement('h2');
            titleEl.style.color = "#ffcc00"; titleEl.style.textAlign = "center"; titleEl.style.fontSize = "26px"; titleEl.innerText = mainTitle;
            const descEl = document.createElement('p');
            descEl.style.textAlign = "center"; descEl.style.lineHeight = "1.8"; descEl.innerText = subDesc;
            
            storyBox.appendChild(titleEl);
            storyBox.appendChild(descEl);

            const box = document.getElementById('choice-box');
            box.innerHTML = '';
            const retryBtn = document.createElement('button');
            retryBtn.className = 'btn'; retryBtn.style.textAlign = "center";
            retryBtn.innerText = "윤회 (처음으로)";
            retryBtn.onclick = () => location.reload();
            box.appendChild(retryBtn);
        }
    </script>
</body>
</html>
