<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BLUEBIRD: THE OCCULT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght=400;700&display=swap');
        
        /* 📍 배경을 완전하고 순수한 검정화면으로 통일 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000000; font-family: 'Noto Serif KR', serif; overflow: hidden; display: flex; justify-content: center; align-items: center; color: #fff; }
        
        /* 📍 배경 이미지 요소를 순수 검정색으로 고정 */
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000000; transition: 2s; z-index: 1; }
        
        /* 📍 메인 컨테이너: 가로 2단 대칭형 레이아웃 구성 */
        #container { 
            position: relative; 
            z-index: 10; 
            width: 96%; 
            max-width: 1500px; 
            height: 85vh;
            max-height: 800px;
            display: none; 
            flex-direction: row; 
            justify-content: space-between;
            align-items: center;
            gap: 25px;
        }

        /* 🖼️ [왼쪽] 대형 비주얼/미디어 영역 (선택창 좌측에 사진이 들어가는 공간) */
        .media-visual-area {
            flex: 1.6;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center; /* 📍 중앙 정렬로 변경 */
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            background: rgba(15, 15, 25, 0.6); /* 살짝 어두운 패널 느낌 */
            border: 1px solid rgba(74, 144, 226, 0.15);
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.8);
        }

        /* 미디어 박스 내 이미지 정렬 */
        .char-container-box {
            position: relative;
            width: 92%;
            height: 92%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 📍 좌측 칸에 들어가는 이미지 스타일 설정 */
        .char-img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 6px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
            z-index: 2;
            transition: all 0.5s ease-in-out;
        }

        /* 📜 [오른쪽] 인터페이스 & 선택지 영역 */
        .interface-right-area {
            flex: 1; 
            height: 100%;
            padding: 30px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-y: auto;
            background: rgba(7, 7, 12, 0.97); 
            border: 1px solid rgba(74, 144, 226, 0.35); 
            backdrop-filter: blur(25px); 
            box-shadow: -10px 0 50px rgba(0,0,0,0.9); 
            border-radius: 12px;
        }

        .game-header-title { font-size: 20px; color: #4a90e2; letter-spacing: 6px; text-align: center; margin-bottom: 20px; border-bottom: 1px solid rgba(74, 144, 226, 0.3); padding-bottom: 12px; font-weight: bold; text-shadow: 0 0 10px rgba(74,144,226,0.3); }
        #scene-name { font-size: 12px; color: #888; letter-spacing: 2px; margin-bottom: 15px; text-align: right; font-style: italic; }

        /* 스탯 디자인 */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(255,255,255,0.04); padding: 12px 5px; margin-bottom: 25px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); }
        .stat { text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }
        .stat:last-child { border-right: none; }
        .label { display: block; font-size: 11px; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        .val { font-weight: bold; font-size: 16px; }
        #omega { color: #5dade2; } #upbo { color: #ec7063; } #phi { color: #58d68d; } #hp { color: #f4d03f; }

        /* 대사 시스템 */
        .speaker-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        #speaker-name { font-size: 17px; color: #4a90e2; font-weight: bold; letter-spacing: 2px; padding-left: 10px; border-left: 4px solid #4a90e2; }
        #speaker-role-tag { font-size: 11px; color: #888; border: 1px solid #444; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,0.05); }
        #story-text { color: #e5e5e5; line-height: 1.9; font-size: 16px; min-height: 150px; margin-bottom: 25px; white-space: pre-wrap; letter-spacing: 0.5px; }
        
        /* 우측 선택지 보드 디자인 */
        .choice-box { display: flex; flex-direction: column; gap: 10px; margin-bottom: 5px; }
        .btn { display: block; width: 100%; padding: 16px 20px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.12); color: #ccc; cursor: pointer; text-align: left; transition: all 0.25s ease; font-family: inherit; font-size: 14px; border-radius: 6px; }
        .btn:hover { background: rgba(74, 144, 226, 0.25); color: #fff; border-color: #4a90e2; padding-left: 28px; box-shadow: 0 0 15px rgba(74,144,226,0.2); }

        /* 오프닝 */
        #opening { position: relative; z-index: 20; text-align: center; color: #fff; }
        #opening h1 { font-size: 60px; letter-spacing: 20px; color: #4a90e2; text-shadow: 0 0 30px rgba(74, 144, 226, 0.8); margin-bottom: 60px; }
        .occult-btn { padding: 25px 80px; font-size: 22px; background: rgba(0, 0, 0, 0.8); border: 1px solid #4a90e2; color: #4a90e2; cursor: pointer; transition: 0.5s; font-family: inherit; letter-spacing: 6px; }
        .occult-btn:hover { background: #4a90e2; color: #fff; box-shadow: 0 0 40px rgba(74, 144, 226, 0.5); }

        .developer-info { position: fixed; top: 25px; left: 30px; z-index: 30; font-size: 14px; letter-spacing: 2px; color: rgba(255, 255, 255, 0.65); font-family: inherit; border-left: 3px solid #4a90e2; padding-left: 12px; line-height: 1.6; }
        .developer-info span { color: #4a90e2; font-weight: bold; }
    </style>
</head>
<body>
    <div id="bg"></div>

    <div id="dev-header" class="developer-info">
        DEVELOPER<br>
        <span>25730027 김서원</span>
    </div>

    <div id="opening">
        <h1>BLUEBIRD</h1>
        <p style="color:#888; margin-bottom:50px; letter-spacing:5px;">THE OCCULT : 관측의 저주</p>
        <button class="occult-btn" onclick="startGame()">심연의 눈을 뜨다</button>
    </div>

    <div id="container">
        
        <div class="media-visual-area">
            <div class="char-container-box">
                <img id="media-illustration" class="char-img" src="" alt="Scene Illustration">
            </div>
        </div>

        <div class="interface-right-area">
            <div>
                <div class="game-header-title">BLUEBIRD: THE OCCULT</div>
                <div id="scene-name">Scene: LOADING...</div>
                
                <div class="stats-bar">
                    <div class="stat"><span class="label">오염(Ω)</span><span id="omega" class="val">20</span></div>
                    <div class="stat"><span class="label">업보(Karma)</span><span id="upbo" class="val">0</span></div>
                    <div class="stat"><span class="label">명료(φ)</span><span id="phi" class="val">50</span></div>
                    <div class="stat"><span class="label">체력(HP)</span><span id="hp" class="val">100</span></div>
                </div>
                
                <div class="speaker-wrap">
                    <div id="speaker-name">시스템</div>
                    <div id="speaker-role-tag">관측 대상</div>
                </div>
                <div id="story-text"></div>
            </div>

            <div>
                <div id="choice-box" class="choice-box"></div>
            </div>
        </div>

    </div>

    <script>
        let stats = { omega: 20, upbo: 0, phi: 50, hp: 100 };

        /* 📍 배경을 사용하지 않으므로, 이 자리에 주셨던 이미지를 왼쪽 전용 파일로 매핑했습니다. */
        const sceneImages = { 
            s1: './image/S1.png', 
            s2: './image/S2.png', 
            s3: './image/S3.png', 
            s4: './image/S4.png', 
            s5: '', // 데이터가 없는 씬은 공백 처리 혹은 원하는 기본값 지정 가능
            end_good: './image/S2.png', // 엔딩 시 좌측 예시용 지정
            end_bad: './image/S1.png'
        };

        function startGame() {
            document.getElementById('dev-header').style.display = 'none';
            document.getElementById('opening').style.display = 'none';
            document.getElementById('container').style.display = 'flex';
            update('s1');
        }

        const data = {
            s1: { 
                scene: "S1: 청조촌 입구", speaker: "청조촌 무녀", role: "무녀",
                image: sceneImages.s1,
                text: "'가련한 관측자여, 그 눈으로는 아무것도 구할 수 없다. 내가 주는 이 푸른 안구를 받아들여라. 비로소 동생이 보일 것이니.'", 
                choices: [
                    { t: "[수용] 푸른 안구를 이식한다.", n: 's2', e: { omega: 30 } },
                    { t: "[저항] 무녀의 손을 뿌리친다.", n: 's2', e: { hp: -25, upbo: 10 } }
                ]
            },
            s2: { 
                scene: "S2: 망자의 늪", speaker: "미치의 환영", role: "원혼",
                image: sceneImages.s2,
                text: "'언니... 나 여기 있어... 너무 추워... 왜 이제야 온 거야?'\n\n늪 속에서 동생의 목소리가 들리지만, 어딘가 기괴하게 뒤틀려 있습니다.", 
                choices: [
                    { t: "[불신] 환상을 외면하고 길을 찾는다.", n: 's3', e: { upbo: -10, phi: 15 } },
                    { t: "[맹신] 소리가 나는 늪으로 뛰어든다.", n: 's3', e: { upbo: 15, phi: -20, omega: 20 } }
                ]
            },
            s3: { 
                scene: "S3: 경전 각", speaker: "도서관 수호자", role: "수호자",
                image: sceneImages.s3,
                text: "'진실은 독과 같다. 더 깊이 알수록 너는 인간이 아니게 될 것이다. 그래도 이 기록을 탐하겠느냐?'", 
                choices: [
                    { t: "[지식] 금지된 경전을 읽는다.", n: 's4', e: { phi: 20, omega: 15 } },
                    { t: "[침묵] 경전을 불태워 버린다.", n: 's4', e: { upbo: -15, hp: -10 } }
                ]
            },
            s4: { 
                scene: "S4: 탄생의 굴", speaker: "괴조들의 왕", role: "보스",
                image: sceneImages.s4,
                text: "'크헤헤... 이 아이는 우리의 제물이다! 구하고 싶나? 그럼 네 육신의 절반을 내놓아라!'", 
                choices: [
                    { t: "[희생] 내 피를 제물로 바친다.", n: 's5', e: { hp: -50, upbo: -25 } },
                    { t: "[투쟁] 괴조의 심장을 겨냥한다.", n: 's5', e: { upbo: 40, omega: -10 } }
                ]
            },
            s5: { 
                scene: "S5: 밤의 궁전", speaker: "파랑새의 눈", role: "심연",
                image: sceneImages.s4, // 필요시 별도의 s5 지정 가능
                text: "'마침내 도달했구나. 이제 관측을 끝낼 시간이다. 스스로 파멸할 것인가, 아니면 이 저주받은 세계의 주인이 될 것인가?'", 
                choices: [
                    { t: "[해방] 이 모든 저주를 끊어낸다.", n: 'choice_liberation' },
                    { t: "[군림] 동생의 운명까지 심연으로 잠식한다.", n: 'choice_reign' }
                ]
            }
        };

        function update(id) {
            if(id === 'choice_liberation') {
                return (stats.upbo < 20) ? finish('end_good') : finish('end_bad_wander');
            }
            if(id === 'choice_reign') {
                return (stats.omega >= 90) ? finish('end_bad_occult') : finish('end_bad_fail');
            }

            const s = data[id];
            document.getElementById('scene-name').innerText = "Location: " + s.scene;
            document.getElementById('speaker-name').innerText = s.speaker;
            document.getElementById('speaker-role-tag').innerText = s.role;
            document.getElementById('story-text').innerText = s.text;
            for(let key in stats) document.getElementById(key).innerText = stats[key];

            // 📍 선택창 좌측 칸에 씬 이미지 세팅하기
            const img = document.getElementById('media-illustration');
            if(s.image) {
                img.src = s.image;
                img.style.display = 'block';
            } else {
                img.style.display = 'none';
            }

            const box = document.getElementById('choice-box');
            box.innerHTML = '';
            s.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = c.t;
                b.onclick = () => {
                    if(c.e) for(let k in c.e) stats[k] += c.e[k];
                    update(c.n);
                };
                box.appendChild(b);
            });
        }

        function finish(type) {
            document.getElementById('scene-name').innerText = "Location: Destiny";
            const img = document.getElementById('media-illustration');

            let mainTitle = ""; let subDesc = ""; 

            if(type === 'end_good') {
                img.src = sceneImages.end_good;
                img.style.display = 'block';
                mainTitle = "[안식: 진정한 구원]";
                subDesc = "당신은 마침내 동생과 함께 저주를 끊어내고 마을을 탈출했습니다. 이제 안개의 위협이 없는 곳에서 평온한 삶을 살아가세요.";
            } else {
                img.src = sceneImages.end_bad;
                img.style.display = 'block';
                if(type === 'end_bad_wander') {
                    mainTitle = "[방랑: 불완전한 구원]";
                    subDesc = "동생은 구했지만 당신의 업보가 발목을 잡습니다. 동생은 떠나보냈으나 당신은 영원히 안개 속을 떠돌게 될 것입니다.";
                } else if(type === 'end_bad_occult') {
                    mainTitle = "[잠식: 심연의 주인]";
                    subDesc = "인간이기를 포기한 당신은 파랑새의 저주를 완전히 받아들였습니다. 이제 당신이 이 기괴한 마을의 새로운 신입니다.";
                } else {
                    mainTitle = "[소멸: 공허의 파멸]";
                    subDesc = "심연을 감당하기엔 당신의 그릇이 너무나도 작았습니다. 아무것도 구하지 못한 채, 당신은 어둠 속으로 먹혀버렸습니다.";
                }
            }
            
            document.getElementById('speaker-name').innerText = "최종 운명";
            document.getElementById('speaker-role-tag').innerText = "결말";
            const storyBox = document.getElementById('story-text');
            storyBox.innerHTML = '';
            const titleEl = document.createElement('h2');
            titleEl.style.color = "#ffcc00"; titleEl.style.textAlign = "center"; titleEl.style.fontSize = "26px"; titleEl.innerText = mainTitle;
            const descEl = document.createElement('p');
            descEl.style.textAlign = "center"; descEl.style.lineHeight = "1.8"; descEl.innerText = subDesc;
            
            storyBox.appendChild(titleEl);
            storyBox.appendChild(descEl);

            const box = document.getElementById('choice-box');
            box.innerHTML = '';
            const retryBtn = document.createElement('button');
            retryBtn.className = 'btn'; retryBtn.style.textAlign = "center";
            retryBtn.innerText = "윤회 (처음으로)";
            retryBtn.onclick = () => location.reload();
            box.appendChild(retryBtn);
        }
    </script>
</body>
</html>
