<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BLUEBIRD: THE OCCULT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Noto Serif KR', serif; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        
        #bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: brightness(0.7) contrast(1.2); transition: 1.5s; z-index: 1; }
        
        #container { position: relative; z-index: 10; width: 90%; max-width: 680px; background: rgba(5, 5, 10, 0.96); padding: 40px; border: 1px solid rgba(74, 144, 226, 0.3); backdrop-filter: blur(20px); box-shadow: 0 0 100px rgba(0,0,0,1); display: none; }

        .game-header-title { font-size: 20px; color: #4a90e2; letter-spacing: 6px; text-align: center; margin-bottom: 25px; border-bottom: 1px solid rgba(74, 144, 226, 0.3); padding-bottom: 15px; font-weight: bold; }

        #scene-name { font-size: 14px; color: #888; letter-spacing: 2px; margin-bottom: 10px; text-align: right; font-style: italic; }

        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(255,255,255,0.07); padding: 18px 10px; margin-bottom: 30px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .stat { text-align: center; border-right: 1px solid rgba(255,255,255,0.1); }
        .stat:last-child { border-right: none; }
        .label { display: block; font-size: 13px; color: #aaa; margin-bottom: 8px; font-weight: bold; }
        .val { font-weight: bold; font-size: 20px; }
        
        #omega { color: #5dade2; } 
        #upbo { color: #ec7063; }  
        #phi { color: #58d68d; }   
        #hp { color: #f4d03f; }    

        #speaker-name { font-size: 15px; color: #4a90e2; font-weight: bold; letter-spacing: 2px; margin-bottom: 12px; padding-left: 10px; border-left: 4px solid #4a90e2; }
        #story-text { color: #fff; line-height: 1.9; font-size: 18px; min-height: 110px; margin-bottom: 40px; }
        .btn { display: block; width: 100%; padding: 20px; margin-bottom: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.15); color: #ccc; cursor: pointer; text-align: left; transition: 0.3s; font-family: inherit; font-size: 16px; border-radius: 4px; }
        .btn:hover { background: rgba(74, 144, 226, 0.2); color: #fff; border-color: #4a90e2; padding-left: 30px; }

        #opening { position: relative; z-index: 20; text-align: center; color: #fff; }
        #opening h1 { font-size: 60px; letter-spacing: 20px; color: #4a90e2; text-shadow: 0 0 30px rgba(74, 144, 226, 0.8); margin-bottom: 60px; }
        .occult-btn { padding: 25px 80px; font-size: 22px; background: rgba(0, 0, 0, 0.8); border: 1px solid #4a90e2; color: #4a90e2; cursor: pointer; transition: 0.5s; font-family: inherit; letter-spacing: 6px; }
        .occult-btn:hover { background: #4a90e2; color: #fff; box-shadow: 0 0 40px rgba(74, 144, 226, 0.5); }
    </style>
</head>
<body>
    <div id="bg"></div>

    <div id="opening">
        <h1>BLUEBIRD</h1>
        <p style="color:#888; margin-bottom:50px; letter-spacing:5px;">THE OCCULT : Curse of Observation</p>
        <button class="occult-btn" onclick="startGame()">심연의 눈을 뜨다</button>
    </div>

    <div id="container">
        <div class="game-header-title">BLUEBIRD: THE OCCULT</div>
        
        <div id="scene-name">Scene: LOADING...</div>
        
        <div class="stats-bar">
            <div class="stat"><span class="label">오염(Ω)</span><span id="omega" class="val">20</span></div>
            <div class="stat"><span class="label">업보(Karma)</span><span id="upbo" class="val">0</span></div>
            <div class="stat"><span class="label">명료(φ)</span><span id="phi" class="val">50</span></div>
            <div class="stat"><span class="label">체력(HP)</span><span id="hp" class="val">100</span></div>
        </div>
        
        <div id="speaker-name">시스템</div>
        <div id="story-text"></div>
        <div id="choice-box"></div>
    </div>

    <script>
        // 초기 기본 변수 셋팅
        let stats = { omega: 20, upbo: 0, phi: 50, hp: 100 };

        // 📍 매핑 테이블 폴더 경로에 맞춰 배경 파일 연결 수정
        const bgs = { 
            opening: './image/cover.png', 
            s1: './image/S1.png', 
            s2: './image/S2.png', 
            s3: './image/S3.png', 
            s4: './image/S4.png', 
            s5: './image/S5.png',
            re_s3: './image/RE_S3.png',
            s6: './image/S6.png',
            end_a: './image/END_A.png',
            end_w: './image/END_W.png',
            end_b: './image/END_B.png',
            end_f: './image/END_F.png',
            g_over: './image/G_OVER.png'
        };

        document.getElementById('bg').style.backgroundImage = `url('${bgs.opening}')`;

        function startGame() {
            document.getElementById('opening').style.display = 'none';
            document.getElementById('container').style.display = 'block';
            update('s1');
        }

        // 📍 기획서 논리 흐름 100% 매칭 데이터 갱신
        const data = {
            s1: { scene: "S1: 언로깅 하층부", speaker: "청조촌 무녀", bg: bgs.s1, br: 0.7, text: "'가련한 관측자여, 그 눈으로는 아무것도 구할 수 없다. 내가 주는 이 푸른 안구를 받아들여라. 비로소 동생이 보일 것이니.'", choices: [
                { t: "[A] 제안 수용 : 푸른 안구를 이식한다.", n: 's2', e: { omega: 20 } },
                { t: "[B] 강하게 거부 : 무녀의 손을 뿌리친다.", n: 's2', e: { hp: -30, omega: 10 } }
            ]},
            s2: { scene: "S2: 서버 균열", speaker: "미치의 환영", bg: bgs.s2, br: 0.7, text: "'언니... 나 여기 있어... 너무 추워... 왜 이제야 온 거야?'\n\n늪 속에서 동생의 목소리가 들리지만, 어딘가 기괴하게 뒤틀려 있습니다.", choices: [
                { t: "[A] 외면하고 전진 : 환상을 무시한다.", n: 's3', e: { omega: -10, phi: 15 } },
                { t: "[B] 환상을 추격 : 소리가 나는 곳으로 간다.", n: 's3', e: { omega: 15, phi: -20 } }
            ]},
            s3: { scene: "S3: 보안문", speaker: "도서관 수호자", bg: bgs.s3, br: 0.7, text: "'진실은 독과 같다. 더 깊이 알수록 너는 인간이 아니게 될 것이다. 그래도 이 기록을 탐하겠느냐?'", choices: [
                { t: "[A] 기록 열람 : 금지된 문서를 읽는다.", n: 's4', e: { phi: 20, omega: 10 } },
                { t: "[B] 기록 소각 : 문서를 불태워 버린다.", n: 's4', e: { omega: -20, hp: -10 } }
            ]},
            s4: { scene: "S4: 선녀의 방", speaker: "괴조들의 왕 / 미치", bg: bgs.s4, br: 0.7, text: "미치: '언니, 무서워... 저 새들이 나를 노려보고 있어!'\n주인공: '미치야, 조금만 참아...!'\n\n거대한 새들의 왕이 앞을 가로막습니다.", choices: [
                { t: "[A] 미치 보호 : 내 육신과 체력을 깎아 지킨다.", n: 's6', e: { hp: -50, omega: -30 } }, // S6으로 직행
                { t: "[B] 미치 유기/도주 : 일단 자리를 피한다.", n: 's5', e: { omega: 50 } }          // S5로 이동
            ]},
            s5: { scene: "S5: 데이터 강탈", speaker: "청조촌 무녀", bg: bgs.s5, br: 0.7, text: "'보세요, 결국 당신은 관측자가 되기로 선택했군요.'\n주인공: '더 이상 잃을 것도 없어.'\n\n안구의 저주가 심화되며 신체가 격렬하게 오염되기 시작합니다.", choices: [
                { t: "[A] 궁전 강제 돌파 : 고통을 참고 밀어붙인다.", n: 's6', e: { omega: 30, hp: -20 } },
                { t: "[B] 돌파 실패 : 주저앉아 정신을 잃는다.", n: 're_s3', e: {} } // RE_S3 루프 공간으로 이동
            ]},
            re_s3: { scene: "RE_S3: 시스템 복구 (루프)", speaker: "시스템", bg: bgs.re_s3, br: 0.5, text: "[경고] 자아 붕괴 위험 감지. 백업된 기억(미치와의 추억)을 재생하시겠습니까?", choices: [
                { t: "[A] 기억 재생 : 동생을 위해 다시 일어선다.", n: 's3', e: {} }, // S3 단계로 회귀 및 재시도
                { t: "[B] 관측 포기 : 의지마저 소멸해간다.", n: 'g_over_trigger', e: {} } // 관측 종료 엔딩으로 직행
            ]},
            s6: { scene: "S6: 코어의 심장", speaker: "파랑새 / 주인공", bg: bgs.s6, br: 0.6, text: "파랑새: '모든 것을 관측했는가? 이제 네가 이 새장 속에 머물 차례다.'\n주인공: '내가 선택하겠어.'", choices: [
                { t: "[A] 안구 파괴 : 저주의 고리를 수작업으로 파괴한다.", n: 'calc_good' },
                { t: "[B] 안구 개방 : 심연의 힘을 완전히 해방한다.", n: 'calc_bad' }
            ]}
        };

        function update(id) {
            // 엔딩 정산용 간이 트리거 인터셉트
            if(id === 'g_over_trigger') return finish('g_over');
            if(id === 'calc_good') return finish(stats.upbo < 20 ? 'end_a' : 'end_w');
            if(id === 'calc_bad') return finish(stats.omega >= 90 ? 'end_b' : 'end_f');
            
            const s = data[id];
            
            document.getElementById('scene-name').innerText = "Location: " + s.scene;
            
            // 📍 기획서에 있던 연출용 조도 제어 연동 (filter: brightness 적용)
            const bgElement = document.getElementById('bg');
            bgElement.style.backgroundImage = `url('${s.bg}')`;
            bgElement.style.filter = `brightness(${s.br}) contrast(1.2)`;
            
            document.getElementById('speaker-name').innerText = s.speaker;
            document.getElementById('story-text').innerText = s.text;
            
            // 변수 수치 범위 제한 (0 미만 방지)
            for(let key in stats) {
                if(stats[key] < 0) stats[key] = 0;
                document.getElementById(key).innerText = stats[key];
            }
            
            const box = document.getElementById('choice-box');
            box.innerHTML = '';
            s.choices.forEach(c => {
                const b = document.createElement('button');
                b.className = 'btn'; b.innerText = c.t;
                b.onclick = () => {
                    if(c.e) for(let k in c.e) stats[k] += c.e[k];
                    update(c.n);
                };
                box.appendChild(b);
            });
        }

        function finish(type) {
            document.getElementById('scene-name').innerText = "Location: Destiny";
            
            const bgElement = document.getElementById('bg');
            bgElement.style.backgroundImage = `url('${bgs[type]}')`;
            
            let res = "";
            let btnText = "윤회 (처음으로)";
            
            // 📍 기획서 이미지 매핑 테이블 안의 결과 텍스트 & 명시 조도 정밀 반영
            if(type === 'end_a') {
                bgElement.style.filter = "brightness(0.7) contrast(1.2)"; // 밝기 0.7
                res = "[END_A] 안식 (혁명가)<br><br>모든 저주가 해제되었습니다. 당신은 미치와 함께 마을을 탈출해 따스한 햇살 아래 평온한 삶을 살아갑니다.";
            } else if(type === 'end_w') {
                bgElement.style.filter = "brightness(0.45) contrast(1.2)"; // 밝기 0.45
                res = "[END_W] 방랑 (불완전)<br><br>동생은 구출해 냈지만, 그동안 쌓인 업보가 발목을 잡았습니다. 당신은 출구를 찾지 못한 채 쓸쓸한 안개 속을 영원히 유랑합니다.";
            } else if(type === 'end_b') {
                bgElement.style.filter = "brightness(0.05) contrast(1.4)"; // 밝기 0.05
                res = "[END_B] 잠식 (인도주의자)<br><br>인간성을 완전히 포기하고 저주를 수용했습니다. 당신은 심연을 완벽히 통제하며 기괴한 마을의 새로운 신으로 군림합니다.";
            } else if(type === 'end_f') {
                bgElement.style.filter = "brightness(0.4) contrast(1.2)"; // 밝기 0.4
                res = "[END_F] 소멸 (공허)<br><br>거대한 심연의 마법 과부하를 감당하지 못했습니다. 아무것도 구하지 못한 채, 당신의 영혼은 데이터 파편이 되어 영원히 사라집니다.";
            } else if(type === 'g_over') {
                bgElement.style.filter = "brightness(0.3) contrast(1.0)";
                res = "<span style='color:#ec7063; font-weight:bold;'>[OBSERVATION FAILED]</span><br><br>관측자가 스스로 도전을 포기했습니다. 당신의 존재는 영원한 어둠 속으로 완전히 소멸합니다.";
                btnText = "관측 재시작 (타이틀로)";
            }
            
            document.getElementById('speaker-name').innerText = "결말 정산";
            document.getElementById('story-text').innerHTML = `<h2 style="color:#ffcc00; text-align:center; font-size:22px; line-height:1.6; margin-top:20px;">${res}</h2>`;
            document.getElementById('choice-box').innerHTML = `<button class="btn" onclick="location.reload()" style="text-align:center">${btnText}</button>`;
        }
    </script>
</body>
</html>
